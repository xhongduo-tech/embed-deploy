events {
    worker_connections 1024;
}

http {
    # Embedding 实例池（4 节点）
    upstream embedding_pool {
        server embed-1:8000;
        server embed-2:8000;
        server embed-3:8000;
        server embed-4:8000;
    }

    # Reranker 实例池（4 节点）
    upstream reranker_pool {
        server reranker-1:8000;
        server reranker-2:8000;
        server reranker-3:8000;
        server reranker-4:8000;
    }

    server {
        listen 8080;

        # 嵌入请求 → embedding 实例池
        location /v1/embeddings {
            proxy_pass http://embedding_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 重排请求 → reranker 实例池
        location /v1/rerank {
            proxy_pass http://reranker_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
