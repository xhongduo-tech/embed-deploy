events {
    worker_connections 1024;
}

http {
    # ── Embedding 上游池 ──────────────────────────────────────
    # BGE-M3 文本向量化（3 节点负载均衡，Infinity）
    upstream bge_embed_pool {
        server embed-1:8000;
        server embed-2:8000;
        server embed-3:8000;
    }

    # Qwen3-Embedding-8B 文本向量化（2 节点，llama.cpp）
    upstream qwen_embed_8b {
        server embed-qwen-8b:8000;
        server embed-qwen-8b-2:8000;
    }

    # Qwen3-VL-Embedding-2B 多模态向量化（1 节点，llama.cpp）
    upstream qwen_vl_embed {
        server embed-qwen-vl:8000;
    }

    # ── Reranker 上游池 ───────────────────────────────────────
    # BGE-Reranker-V2-M3 文本重排（2 节点负载均衡，Infinity）
    upstream bge_rerank_pool {
        server reranker-1:8000;
        server reranker-2:8000;
    }

    # Qwen3-Reranker-8B 文本重排（1 节点，llama.cpp）
    upstream qwen_reranker {
        server reranker-qwen:8000;
    }

    # Qwen3-VL-Reranker-2B 多模态重排（1 节点，llama.cpp）
    upstream qwen_vl_reranker {
        server reranker-qwen-vl:8000;
    }

    server {
        listen 8080;
        root /usr/share/nginx/html;

        # ── Embedding 路由 ────────────────────────────────────
        # BGE-M3：标准路径，兼容旧接入方式
        location /v1/embeddings {
            rewrite ^/v1/embeddings(.*)$ /embeddings$1 break;
            proxy_pass http://bge_embed_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Qwen3-Embedding-8B：路径 /v1/qwen-embed，透传至 /v1/embeddings
        location /v1/qwen-embed {
            proxy_pass http://qwen_embed_8b/v1/embeddings;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Qwen3-VL-Embedding-2B：路径 /v1/qwen-vl-embed，透传至 /v1/embeddings
        location /v1/qwen-vl-embed {
            proxy_pass http://qwen_vl_embed/v1/embeddings;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Reranker 路由 ─────────────────────────────────────
        # BGE-Reranker：标准路径，兼容旧接入方式
        location /v1/rerank {
            rewrite ^/v1/rerank(.*)$ /rerank$1 break;
            proxy_pass http://bge_rerank_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Qwen3-Reranker-8B：路径 /v1/qwen-rerank，透传至 /v1/rerank
        location /v1/qwen-rerank {
            proxy_pass http://qwen_reranker/v1/rerank;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Qwen3-VL-Reranker-2B：路径 /v1/qwen-vl-rerank，透传至 /v1/rerank
        location /v1/qwen-vl-rerank {
            proxy_pass http://qwen_vl_reranker/v1/rerank;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 页端：API 使用文档与示例
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
